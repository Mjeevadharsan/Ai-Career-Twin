# Configure Spring Boot server port
server.port=${PORT:5000}

# Optional: Disable verbose logging of database initialization
spring.main.banner-mode=off
logging.level.org.springframework.web=INFO

# H2 Embedded File Database (works on Render and locally with zero setup)
# Uses ./data/ folder locally, or /opt/render/project/src/data/ on Render (persistent disk)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ai_career_twin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.h2.console.enabled=false
