# Configure Spring Boot server port
server.port=${PORT:5001}

# Optional: Disable verbose logging of database initialization
spring.main.banner-mode=off
logging.level.org.springframework.web=INFO

# H2 Embedded Database Configuration (MySQL compatibility mode)
# This works out of the box without needing to install MySQL locally.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/career_twin;MODE=MySQL;DATABASE_TO_UPPER=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true


# ── Email OTP Verification (Brevo HTTP API) ──
# Get API Key from Brevo Dashboard (SMTP & API -> API Keys)
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=aicareertwin@gmail.com
brevo.sender.name=AI Career Twin


